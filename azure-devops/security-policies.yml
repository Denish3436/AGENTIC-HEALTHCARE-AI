# Azure Security and Compliance Policies for Healthcare AI Platform
# HIPAA-compliant security configurations

apiVersion: v1
kind: ConfigMap
metadata:
  name: security-policies
  namespace: healthcare-ai
data:
  # Network Policies
  network-policy.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: healthcare-ai-network-policy
      namespace: healthcare-ai
    spec:
      podSelector:
        matchLabels:
          app: healthcare-ai
      policyTypes:
        - Ingress
        - Egress
      ingress:
        - from:
          - namespaceSelector:
              matchLabels:
                name: healthcare-ai
          - podSelector:
              matchLabels:
                tier: frontend
          ports:
            - protocol: TCP
              port: 8000
            - protocol: TCP
              port: 8001
            - protocol: TCP
              port: 3030
      egress:
        - to:
          - namespaceSelector: {}
          ports:
            - protocol: TCP
              port: 443
            - protocol: TCP
              port: 5432
            - protocol: TCP
              port: 6379

  # Pod Security Policy
  pod-security-policy.yaml: |
    apiVersion: policy/v1beta1
    kind: PodSecurityPolicy
    metadata:
      name: healthcare-ai-psp
      annotations:
        seccomp.security.alpha.kubernetes.io/allowedProfileNames: 'runtime/default'
        apparmor.security.beta.kubernetes.io/allowedProfileNames: 'runtime/default'
    spec:
      privileged: false
      allowPrivilegeEscalation: false
      requiredDropCapabilities:
        - ALL
      volumes:
        - 'configMap'
        - 'emptyDir'
        - 'projected'
        - 'secret'
        - 'downwardAPI'
        - 'persistentVolumeClaim'
      hostNetwork: false
      hostIPC: false
      hostPID: false
      runAsUser:
        rule: 'MustRunAsNonRoot'
      seLinux:
        rule: 'RunAsAny'
      supplementalGroups:
        rule: 'RunAsAny'
      fsGroup:
        rule: 'RunAsAny'
      readOnlyRootFilesystem: false

  # Azure Policy Definitions
  azure-policy.json: |
    {
      "policies": [
        {
          "name": "Require HTTPS for Healthcare APIs",
          "description": "Ensures all API endpoints use HTTPS",
          "mode": "All",
          "policyRule": {
            "if": {
              "allOf": [
                {
                  "field": "type",
                  "equals": "Microsoft.ApiManagement/service/apis"
                },
                {
                  "field": "Microsoft.ApiManagement/service/apis/protocols",
                  "notContains": "https"
                }
              ]
            },
            "then": {
              "effect": "deny"
            }
          }
        },
        {
          "name": "Require Encryption at Rest",
          "description": "Ensures all storage accounts have encryption enabled",
          "mode": "All",
          "policyRule": {
            "if": {
              "allOf": [
                {
                  "field": "type",
                  "equals": "Microsoft.Storage/storageAccounts"
                },
                {
                  "field": "Microsoft.Storage/storageAccounts/encryption.services.blob.enabled",
                  "notEquals": "true"
                }
              ]
            },
            "then": {
              "effect": "deny"
            }
          }
        },
        {
          "name": "Require Private Endpoints",
          "description": "Ensures Azure services use private endpoints",
          "mode": "All",
          "policyRule": {
            "if": {
              "allOf": [
                {
                  "field": "type",
                  "in": [
                    "Microsoft.KeyVault/vaults",
                    "Microsoft.ContainerRegistry/registries",
                    "Microsoft.DBforPostgreSQL/flexibleServers"
                  ]
                },
                {
                  "field": "Microsoft.Network/privateEndpoints",
                  "exists": "false"
                }
              ]
            },
            "then": {
              "effect": "audit"
            }
          }
        }
      ]
    }

  # HIPAA Compliance Checklist
  hipaa-compliance.yaml: |
    compliance:
      standard: "HIPAA"
      controls:
        - id: "164.308(a)(1)(i)"
          name: "Security Management Process"
          status: "implemented"
          implementation:
            - "Azure Security Center enabled"
            - "Azure Policy for compliance enforcement"
            - "Regular security assessments via Azure Advisor"
        
        - id: "164.308(a)(3)(i)"
          name: "Workforce Security"
          status: "implemented"
          implementation:
            - "Azure AD for identity management"
            - "RBAC for access control"
            - "MFA enforced for all users"
        
        - id: "164.308(a)(4)(i)"
          name: "Information Access Management"
          status: "implemented"
          implementation:
            - "Azure AD Conditional Access"
            - "Privileged Identity Management"
            - "Just-in-time access"
        
        - id: "164.308(a)(5)(i)"
          name: "Security Awareness and Training"
          status: "implemented"
          implementation:
            - "Security training documentation"
            - "Incident response procedures"
            - "Regular security updates"
        
        - id: "164.308(a)(6)(i)"
          name: "Security Incident Procedures"
          status: "implemented"
          implementation:
            - "Azure Sentinel for SIEM"
            - "Automated incident response"
            - "Audit logging enabled"
        
        - id: "164.312(a)(1)"
          name: "Access Control"
          status: "implemented"
          implementation:
            - "Unique user identification via Azure AD"
            - "Emergency access procedures"
            - "Automatic logoff after inactivity"
            - "Encryption and decryption"
        
        - id: "164.312(b)"
          name: "Audit Controls"
          status: "implemented"
          implementation:
            - "Azure Monitor for comprehensive logging"
            - "Log Analytics for audit trails"
            - "Immutable audit logs"
        
        - id: "164.312(c)(1)"
          name: "Integrity"
          status: "implemented"
          implementation:
            - "Data integrity checks"
            - "Digital signatures"
            - "Checksums for data validation"
        
        - id: "164.312(d)"
          name: "Person or Entity Authentication"
          status: "implemented"
          implementation:
            - "Azure AD authentication"
            - "Multi-factor authentication"
            - "Certificate-based authentication"
        
        - id: "164.312(e)(1)"
          name: "Transmission Security"
          status: "implemented"
          implementation:
            - "TLS 1.2+ for all communications"
            - "VPN for remote access"
            - "End-to-end encryption"

  # Security Scanning Configuration
  security-scanning.yaml: |
    scanning:
      container_images:
        tool: "Azure Defender for Container Registries"
        schedule: "on_push"
        severity_threshold: "HIGH"
        fail_on_critical: true
      
      code_analysis:
        tools:
          - name: "SonarQube"
            enabled: true
            quality_gate: "strict"
          - name: "Bandit"
            enabled: true
            severity: "medium"
          - name: "Safety"
            enabled: true
        
      dependency_scanning:
        tools:
          - name: "Dependabot"
            enabled: true
            auto_merge: false
          - name: "Snyk"
            enabled: true
            severity_threshold: "high"
      
      infrastructure_scanning:
        tools:
          - name: "Checkov"
            enabled: true
            frameworks: ["bicep", "terraform", "kubernetes"]
          - name: "tfsec"
            enabled: true
      
      runtime_protection:
        tool: "Azure Defender for Kubernetes"
        enabled: true
        threat_detection: true
        behavioral_analytics: true

  # Data Encryption Configuration
  encryption-config.yaml: |
    encryption:
      at_rest:
        enabled: true
        method: "Azure Storage Service Encryption"
        key_management: "Azure Key Vault"
        key_rotation: "90_days"
        algorithms:
          - "AES-256"
      
      in_transit:
        enabled: true
        protocols:
          - "TLS 1.2"
          - "TLS 1.3"
        cipher_suites:
          - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
          - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      
      database:
        transparent_data_encryption: true
        always_encrypted: true
        column_encryption: true
      
      backup:
        encryption_enabled: true
        key_vault_integration: true
